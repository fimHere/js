<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea House</title>

    <!-- tailwindCss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- banner section here -->
    <div
      class="parent_div min-h-[200px] container mx-auto px-16 flex justify-between items-center"
    >
      <div class="left_div space-y-4">
        <h1 class="text-6xl font-bold">
          It's good <br />
          tea time at The <br />
          Tea House
        </h1>

        <p class="text-[18px]">
          Tea and Botanical Solutions Supplier Give Optimum <br />Satisfaction
          To Your Taste Buds.
        </p>

        <button class="w-[200px] h-[64px] bg-green-700 rounded-md">
          Explore More
        </button>
      </div>

      <div class="right_div">
        <img src="./images/banner.png" class="relative mt-[130px]" alt="" />

        <div
          class="rating_div bg-blue-600 w-[300px] h-[100px] flex items-center gap-2 rounded-lg shadow-2xl"
        >
          <span class="text-xl">
            <i class="fa-solid fa-star text-yellow-400"></i>
          </span>

          <div class="info">
            <p class="text-xl font-bold">5.00</p>
            <p>Trust Pilot Ratings</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
