<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay-oo MFS App</title>

    <!-- daisyui cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- tailwind css cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-[#f4f5f7] h-[100vh] flex flex-col justify-center items-center"
  >
    <div
      class="w-[400px] h-[180px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center"
    >
      <img src="./assets/Group.png" alt="" />
    </div>

    <form class="w-[450px] space-y-4 bg-white rounded-2xl p-8 shadow-xl">
      <div class="">
        <label class="font-semibold">Mobile Number</label>
        <br />
        <input
          id="inputMobile"
          type="text"
          placeholder="Enter your number"
          class="input bg-[#dce6fa] rounded-2xl"
        />
      </div>

      <div class="">
        <label class="font-semibold">4 Digit Pin</label>
        <br />
        <input
          id="inputPin"
          type="text"
          placeholder="Enter 4 Digit Pin"
          class="input bg-[#dce6fa] rounded-2xl"
        />
      </div>

      <button
        id="loginBtn"
        class="btn text-lg text-white font-bold bg-blue-600 rounded-2xl w-full mt-5"
      >
        Login
      </button>
    </form>

    <!-- scripts here -->
    <script src="./app.js"></script>
    <script src="./sharedCode.js"></script>
  </body>
</html>
