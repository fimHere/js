<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay-oo MFS App</title>

    <!-- daisyui cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- tailwind css cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#f4f5f7] h-[100vh] space-y-5">
    <div
      class="p-2 rounded-md flex justify-between items-center max-w-lg mx-auto shadow-lg"
    >
      <div class="flex space-x-2">
        <img src="./assets/Group.png" alt="" />
        <div class="">
          <h2 class="font-bold">$<span>45000</span></h2>
          <p class="capitalize text-[#08080880]">available balance</p>
        </div>
      </div>

      <div class="">
        <button class="btn">
          <i class="rotate-180 fa-solid fa-right-from-bracket"></i>
          <span class="text-[#08080880]">Logout</span>
        </button>
      </div>
    </div>

    <div class="max-w-lg mx-auto">
      <h1 class="text-2xl capitalize font-bold">🔥welcome to payoo!</h1>
      <p class="text-[#08080880]">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>
    </div>

    <div class="max-w-lg mx-auto border-2 min-h-[200px]">
      <div class="p-3 border-2 text-center">
        <img class="mx-auto" src="./assets/wallet1.png" alt="" />
        <h3>add money</h3>
      </div>
      <div class="p-3 border-2 text-center">
        <img class="mx-auto" src="./assets/send1.png" alt="" />
        <h3>cash out</h3>
      </div>
      <div class="p-3 border-2 text-center">
        <img class="mx-auto" src="./assets/money1.png" alt="" />
        <h3>transfer money</h3>
      </div>
      <div class="p-3 border-2 text-center">
        <img class="mx-auto" src="./assets/bonus1.png" alt="" />
        <h3>get bonus</h3>
      </div>
      <div class="p-3 border-2 text-center">
        <img class="mx-auto" src="./assets/purse1.png" alt="" />
        <h3>pay bill</h3>
      </div>
      <div class="p-3 border-2 text-center">
        <img class="mx-auto" src="./assets/transaction1.png" alt="" />
        <h3>transactions</h3>
      </div>
    </div>

    <!-- scripts here -->
  </body>
</html>
